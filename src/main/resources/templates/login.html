<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="container mt-5">

<h2>Login</h2>

<!-- Mensaje de logout exitoso -->
<div th:if="${param.logout}" class="alert alert-success">Has cerrado sesión correctamente.</div>
<!-- Mensaje de error de autenticación -->
<div th:if="${param.error}" class="alert alert-danger">Usuario o contraseña inválidos.</div>

<form th:action="@{/login}" method="post">
	<div class="mb-3">
		<label for="username" class="form-label">Usuario:</label>
		<input type="text" id="username" name="username" class="form-control" placeholder="Usuario"/>
	</div>
	<div class="mb-3">
		<label for="password" class="form-label">Contraseña:</label>
		<input type="password" id="password" name="password" class="form-control" placeholder="Contraseña"/>
	</div>
	<button class="btn btn-primary"><i class="bi bi-person-fill"></i> Entrar</button>
</form>

</body>
</html>
