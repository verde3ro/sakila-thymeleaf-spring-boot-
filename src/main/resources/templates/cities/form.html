<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Formulario Ciudad</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<!-- Título dinámico según creación o edición -->
<h2 th:text="${cityRequest.cityId == null} ? 'Nueva Ciudad' : 'Editar Ciudad'"></h2>

<!-- Mostrar mensajes flash (se pasan mediante RedirectAttributes) -->
<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

<!-- Formulario con Thymeleaf y validación -->
<form th:action="@{/cities}" th:object="${cityRequest}" method="post">
	<input type="hidden" th:field="*{cityId}"/>

	<div class="mb-3">
		<label class="form-label">Nombre de la ciudad</label>
		<input type="text" th:field="*{city}" class="form-control"
		       th:classappend="${#fields.hasErrors('city')} ? 'is-invalid' : ''"/>
		<div class="invalid-feedback" th:errors="*{city}">Error en el nombre</div>
	</div>

	<div class="mb-3">
		<label class="form-label">País</label>
		<select th:field="*{countryId}" class="form-select"
		        th:classappend="${#fields.hasErrors('countryId')} ? 'is-invalid' : ''">
			<option value="">Seleccione un país</option>
			<option th:each="c : ${countries}"
			        th:value="${c.countryId}"
			        th:text="${c.country}"></option>
		</select>
		<div class="invalid-feedback" th:errors="*{countryId}">Error en país</div>
	</div>

	<div class="mb-3">
		<label class="form-label">Fecha de actualización</label>
		<input type="datetime-local" th:field="*{lastUpdate}" class="form-control"
		       th:classappend="${#fields.hasErrors('lastUpdate')} ? 'is-invalid' : ''"/>
		<div class="invalid-feedback" th:errors="*{lastUpdate}">Error en fecha</div>
	</div>

	<button type="submit" class="btn btn-primary">Guardar</button>
	<a th:href="@{/cities}" class="btn btn-secondary">Cancelar</a>
</form>

</body>
</html>
