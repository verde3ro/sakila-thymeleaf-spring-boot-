<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<title>Listado de Ciudades</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<!-- Cabecera con nombre de usuario y logout -->
<div class="d-flex justify-content-between align-items-center">
	<h2>Listado de Ciudades</h2>
	<div>
		<span sec:authentication="name">Usuario</span>
		<a th:href="@{/logout}" class="btn btn-sm btn-outline-danger ms-2">Cerrar sesión</a>
	</div>
</div>

<!-- Mensajes flash -->
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
	<span th:text="${successMessage}"></span>
	<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
	<span th:text="${errorMessage}"></span>
	<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<a href="/cities/new" class="btn btn-success mb-3">Nueva Ciudad</a>

<!-- Tabla con ordenamiento en cabeceras -->
<table class="table table-bordered table-striped">
	<thead>
	<tr>
		<th>
			<a th:href="@{/cities(page=${currentPage}, sortField='cityId', sortOrder=${reverseSortOrder})}">
				ID
			</a>
		</th>
		<th>
			<a th:href="@{/cities(page=${currentPage}, sortField='city', sortOrder=${reverseSortOrder})}">
				Ciudad
			</a>
		</th>
		<th>
			<a th:href="@{/cities(page=${currentPage}, sortField='countryName', sortOrder=${reverseSortOrder})}">
				País
			</a>
		</th>
		<th>Acciones</th>
	</tr>
	</thead>
	<tbody>
	<tr th:each="c : ${cities}">
		<td th:text="${c.cityId}"></td>
		<td th:text="${c.city}"></td>
		<td th:text="${c.countryName}"></td>
		<td>
			<a th:href="@{/cities/edit/{id}(id=${c.cityId})}" class="btn btn-sm btn-warning">Editar</a>
			<a th:href="@{/cities/delete/{id}(id=${c.cityId})}" class="btn btn-sm btn-danger"
			   onclick="return confirm('¿Eliminar esta ciudad?')">Eliminar</a>
		</td>
	</tr>
	</tbody>
</table>

<!-- Paginación simple -->
<nav th:if="${totalPages > 0}">
	<ul class="pagination">
		<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
			<a class="page-link" th:href="@{/cities(page=${currentPage - 1}, sortField=${sortField}, sortOrder=${sortOrder})}">Anterior</a>
		</li>
		<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
		    th:classappend="${i == currentPage} ? 'active' : ''">
			<a class="page-link" th:href="@{/cities(page=${i}, sortField=${sortField}, sortOrder=${sortOrder})}" th:text="${i + 1}"></a>
		</li>
		<li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
			<a class="page-link" th:href="@{/cities(page=${currentPage + 1}, sortField=${sortField}, sortOrder=${sortOrder})}">Siguiente</a>
		</li>
	</ul>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
