<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Listado de Ciudades</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<!-- Estilos personalizados -->
	<link rel="stylesheet" th:href="@{/css/cities/list.css}">
	<!-- jQuery (requerido por Bootbox) -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<!-- Bootbox JS -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/6.0.0/bootbox.min.js"></script>
</head>
<body class="container mt-4">

<!-- Cabecera con nombre de usuario y logout -->
<div class="d-flex justify-content-between align-items-center">
	<h2>Listado de Ciudades</h2>
	<div>
		<strong><span sec:authentication="name">Usuario</span></strong>
		<a th:href="@{/logout}" class="btn btn-sm btn-outline-danger ms-2">
			<i class="bi bi-box-arrow-right"></i> Cerrar sesión
		</a>
	</div>
</div>

<!-- Mensajes flash -->
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
	<span th:text="${successMessage}"></span>
	<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
	<span th:text="${errorMessage}"></span>
	<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- Barra superior: botones y selector de registros -->
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
	<div class="d-flex gap-2">
		<a sec:authorize="hasRole('ADMIN')" href="/cities/new" class="btn btn-success">
			<i class="bi bi-plus-circle"></i> Nueva Ciudad
		</a>
		<a href="/cities/download/excel" class="btn btn-outline-success">
			<i class="bi bi-file-earmark-excel"></i> Excel
		</a>
	</div>

	<!-- Selector de tamaño de página -->
	<div class="d-flex align-items-center">
		<label for="pageSizeSelect" class="me-2">Mostrar:</label>
		<select id="pageSizeSelect" class="form-select form-select-sm w-auto">
			<option value="5" th:selected="${size == 5}">5</option>
			<option value="10" th:selected="${size == 10}">10</option>
			<option value="25" th:selected="${size == 25}">25</option>
			<option value="50" th:selected="${size == 50}">50</option>
			<option value="100" th:selected="${size == 100}">100</option>
		</select>
		<span class="ms-2 text-muted">registros</span>
	</div>
</div>

<!-- ===== PAGINACIÓN SUPERIOR ===== -->
<nav th:if="${totalPages > 0}" class="mb-3">
	<ul class="pagination justify-content-center">
		<!-- Anterior -->
		<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
			<a class="page-link"
			   th:href="@{/cities(page=${currentPage - 1}, size=${size}, sortField=${sortField}, sortOrder=${sortOrder})}">
				<i class="bi bi-chevron-left"></i> Anterior
			</a>
		</li>

		<!-- Rango de páginas -->
		<th:block th:with="maxPages=10,
                          startPage=${currentPage - 5 < 0 ? 0 : currentPage - 5},
                          endPage=${startPage + maxPages - 1 >= totalPages ? totalPages - 1 : startPage + maxPages - 1},
                          startPage=${endPage - maxPages + 1 < 0 ? 0 : endPage - maxPages + 1}">
			<li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
			    th:classappend="${i == currentPage} ? 'active' : ''">
				<a class="page-link"
				   th:href="@{/cities(page=${i}, size=${size}, sortField=${sortField}, sortOrder=${sortOrder})}"
				   th:text="${i + 1}"></a>
			</li>
		</th:block>

		<!-- Siguiente -->
		<li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
			<a class="page-link"
			   th:href="@{/cities(page=${currentPage + 1}, size=${size}, sortField=${sortField}, sortOrder=${sortOrder})}">
				Siguiente <i class="bi bi-chevron-right"></i>
			</a>
		</li>
	</ul>
</nav>

<!-- Tabla con ordenamiento en cabeceras -->
<table class="table table-bordered table-striped">
	<thead>
	<tr>
		<th>
			<a th:href="@{/cities(page=${currentPage}, size=${size}, sortField='cityId', sortOrder=${reverseSortOrder})}">
				ID <i class="bi bi-arrow-down-up text-muted ms-1"></i>
			</a>
		</th>
		<th>
			<a th:href="@{/cities(page=${currentPage}, size=${size}, sortField='city', sortOrder=${reverseSortOrder})}">
				Ciudad <i class="bi bi-arrow-down-up text-muted ms-1"></i>
			</a>
		</th>
		<th>
			<a th:href="@{/cities(page=${currentPage}, size=${size}, sortField='countryName', sortOrder=${reverseSortOrder})}">
				País <i class="bi bi-arrow-down-up text-muted ms-1"></i>
			</a>
		</th>
		<!-- Nueva columna: Fecha de actualización -->
		<th>
			<a th:href="@{/cities(page=${currentPage}, size=${size}, sortField='lastUpdate', sortOrder=${reverseSortOrder})}">
				Fecha Actualización <i class="bi bi-arrow-down-up text-muted ms-1"></i>
			</a>
		</th>
		<th sec:authorize="hasRole('ADMIN')" class="table-actions">Acciones</th>
	</tr>
	</thead>
	<tbody>
	<tr th:each="c : ${cities}">
		<td th:text="${c.cityId}"></td>
		<td th:text="${c.city}"></td>
		<td th:text="${c.countryName}"></td>
		<!-- Mostrar fecha formateada (dd/MM/yyyy HH:mm) -->
		<td th:text="${c.lastUpdate != null ? #temporals.format(c.lastUpdate, 'dd/MM/yyyy HH:mm') : ''}"></td>
		<td sec:authorize="hasRole('ADMIN')" class="table-actions">
			<!-- Botón Editar -->
			<a sec:authorize="hasRole('ADMIN')"
			   th:href="@{/cities/edit/{id}(id=${c.cityId})}"
			   class="btn btn-sm btn-warning" title="Editar">
				<i class="bi bi-pencil-square"></i>
			</a>
			<!-- Botón Eliminar -->
			<a sec:authorize="hasRole('ADMIN')"
			   th:href="@{/cities/delete/{id}(id=${c.cityId})}"
			   class="btn btn-sm btn-danger btn-delete"
			   th:attr="data-city=${c.city}"
			   title="Eliminar">
				<i class="bi bi-trash"></i>
			</a>
		</td>
	</tr>
	</tbody>
</table>

<!-- ===== PAGINACIÓN INFERIOR ===== -->
<nav th:if="${totalPages > 0}">
	<ul class="pagination justify-content-center">
		<!-- Anterior -->
		<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
			<a class="page-link"
			   th:href="@{/cities(page=${currentPage - 1}, size=${size}, sortField=${sortField}, sortOrder=${sortOrder})}">
				<i class="bi bi-chevron-left"></i> Anterior
			</a>
		</li>

		<!-- Rango de páginas -->
		<th:block th:with="maxPages=10,
                          startPage=${currentPage - 5 < 0 ? 0 : currentPage - 5},
                          endPage=${startPage + maxPages - 1 >= totalPages ? totalPages - 1 : startPage + maxPages - 1},
                          startPage=${endPage - maxPages + 1 < 0 ? 0 : endPage - maxPages + 1}">
			<li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
			    th:classappend="${i == currentPage} ? 'active' : ''">
				<a class="page-link"
				   th:href="@{/cities(page=${i}, size=${size}, sortField=${sortField}, sortOrder=${sortOrder})}"
				   th:text="${i + 1}"></a>
			</li>
		</th:block>

		<!-- Siguiente -->
		<li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
			<a class="page-link"
			   th:href="@{/cities(page=${currentPage + 1}, size=${size}, sortField=${sortField}, sortOrder=${sortOrder})}">
				Siguiente <i class="bi bi-chevron-right"></i>
			</a>
		</li>
	</ul>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Script personalizado -->
<script th:src="@{/js/cities/list.js}"></script>

</body>
</html>
