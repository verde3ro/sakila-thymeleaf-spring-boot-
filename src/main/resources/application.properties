spring.application.name=sakila-spring
spring.datasource.url=jdbc:mysql://localhost:3306/sakila
spring.datasource.username=root
spring.datasource.password=123456789
spring.jpa.hibernate.ddl-auto=validate
# Mostrar SQL en consola
spring.jpa.show-sql=true
# Formatear el SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true
# Resaltar (colorear) el SQL en consola
spring.jpa.properties.hibernate.highlight_sql=true
# (Opcional) Mostrar comentarios en el SQL
spring.jpa.properties.hibernate.use_sql_comments=false

server.error.whitelabel.enabled=false

# Habilitar recursos estáticos para que Thymeleaf pueda servir correctamente
spring.web.resources.add-mappings=true

